apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calculator-backend-staging
  namespace: argocd
spec:
  project: oneplatform
  source:
    repoURL: https://github.com/RajeshPat87/oneplatform_k8s
    targetRevision: main
    path: helm/calculator-backend
    helm:
      valueFiles: [values.yaml]
      values: |
        replicaCount: 3
        image: { tag: "0.1.0" }
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
