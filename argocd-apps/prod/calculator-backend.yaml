apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calculator-backend-prod
  namespace: argocd
spec:
  project: oneplatform
  source:
    repoURL: https://github.com/RajeshPat87/oneplatform_k8s
    targetRevision: main
    path: helm/calculator-backend
    helm:
      valueFiles: [values.yaml]
      values: |
        replicaCount: 4
        image: { tag: "0.1.0" }
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 1,    memory: 1Gi }
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    syncOptions: [CreateNamespace=true]
