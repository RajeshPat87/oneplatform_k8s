apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8strustedregistry
spec:
  crd:
    spec:
      names:
        kind: K8sTrustedRegistry
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              items: { type: string }
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8strustedregistry
        violation[{"msg": msg}] {
          c := input.review.object.spec.template.spec.containers[_]
          not startswith_any(c.image, input.parameters.registries)
          msg := sprintf("image %v is not from a trusted registry", [c.image])
        }
        startswith_any(image, registries) {
          some i
          startswith(image, registries[i])
        }
