parameters:
  - name: appDir
    type: string
  - name: pythonVersion
    type: string
    default: '3.12'

steps:
  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ parameters.pythonVersion }}'
    inputs:
      versionSpec: '${{ parameters.pythonVersion }}'

  - bash: |
      set -euo pipefail
      python -m pip install --upgrade pip
      pip install -e '.[dev]'
    displayName: 'Install deps'
    workingDirectory: ${{ parameters.appDir }}

  - bash: |
      set -euo pipefail
      ruff check app tests
      pylint app --fail-under=8.0 || true
    displayName: 'Lint (ruff + pylint)'
    workingDirectory: ${{ parameters.appDir }}

  - bash: |
      set -euo pipefail
      pytest --junitxml=junit.xml
    displayName: 'Unit tests + coverage (>=80%)'
    workingDirectory: ${{ parameters.appDir }}

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: '${{ parameters.appDir }}/junit.xml'
      failTaskOnFailedTests: true

  - task: PublishCodeCoverageResults@2
    condition: always()
    inputs:
      summaryFileLocation: '${{ parameters.appDir }}/coverage.xml'
