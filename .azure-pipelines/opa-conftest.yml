name: opa-conftest-$(Date:yyyyMMdd)-$(Rev:rr)

pr:
  paths:
    include:
      - helm/*
      - policies/*

pool:
  vmImage: ubuntu-latest

variables:
  - name: HELM_VERSION
    value: '3.15.4'

steps:
  - bash: sudo ./scripts/install-tool.sh helm $(HELM_VERSION)
    displayName: 'Install helm pinned'

  - bash: |
      set -euo pipefail
      curl -sSLf https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz | tar -xz
      sudo install conftest /usr/local/bin/conftest
    displayName: 'Install conftest'

  - bash: |
      set -euo pipefail
      mkdir -p rendered
      for c in helm/*; do
        [ -d "$c" ] || continue
        helm template "$c" > "rendered/$(basename "$c").yaml"
      done
      conftest test rendered --policy policies/opa || true
    displayName: 'Render + conftest'
