replicaCount: 2

image:
  repository: acroneplatform.azurecr.io/calculator-frontend
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    path: /
  readiness:
    path: /

keda:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  cpuThreshold: 70

serviceMonitor:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: calculator.oneplatform.local
  path: /
