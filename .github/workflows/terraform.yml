name: terraform

on:
  push:
    branches: [main]
    paths:
      - 'platform-infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'platform-infra/terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

env:
  TF_DIR: platform-infra/terraform
  TF_VERSION: 1.9.6

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: ${{ env.TF_VERSION }} }
      - run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive
      - run: terraform -chdir=${{ env.TF_DIR }} init -backend=false
      - run: terraform -chdir=${{ env.TF_DIR }} validate
      - name: tflint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint --chdir=${{ env.TF_DIR }} --recursive
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with: { working_directory: ${{ env.TF_DIR }}, soft_fail: false }

  plan:
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure TF backend (RG + SA + container)
        run: ./scripts/ensure-tf-backend.sh
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: ${{ env.TF_VERSION }} }
      - run: terraform -chdir=${{ env.TF_DIR }} init
      - run: terraform -chdir=${{ env.TF_DIR }} plan -no-color -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -out=tfplan
      - uses: actions/upload-artifact@v4
        with: { name: tfplan, path: ${{ env.TF_DIR }}/tfplan }

  apply:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: platform-dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure TF backend (RG + SA + container)
        run: ./scripts/ensure-tf-backend.sh
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: ${{ env.TF_VERSION }} }
      - run: terraform -chdir=${{ env.TF_DIR }} init
      - run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
