name: ci-frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/calculator-frontend/**'
      - 'helm/calculator-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'apps/calculator-frontend/**'
      - 'helm/calculator-frontend/**'

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  APP: calculator-frontend
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/calculator-frontend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/calculator-frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/calculator-frontend/package.json }
      - run: npm install --no-audit --no-fund
      - run: npm run lint || true
      - run: npm test
      - uses: actions/upload-artifact@v4
        with: { name: coverage-frontend, path: apps/calculator-frontend/coverage }

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: 'p/ci p/javascript p/react' }

  build-scan-push:
    needs: [lint-test, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az acr login --name ${{ secrets.ACR_NAME }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/calculator-frontend
          push: false
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-frontend.sarif }
      - run: docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
      - uses: ./.github/actions/gitops-bump
        with:
          app: calculator-frontend
          env: dev
          tag: ${{ steps.tag.outputs.tag }}
