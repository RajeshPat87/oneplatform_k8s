name: opa-conftest

on:
  pull_request:
    paths: ['helm/**', 'policies/**']

jobs:
  conftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install conftest
        run: |
          curl -sSLf https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz | tar -xz
          sudo mv conftest /usr/local/bin/
      - name: Render + test
        run: |
          mkdir -p rendered
          for c in helm/*; do
            [ -d "$c" ] || continue
            helm template "$c" > "rendered/$(basename "$c").yaml"
          done
          conftest test rendered --policy policies/opa || true
