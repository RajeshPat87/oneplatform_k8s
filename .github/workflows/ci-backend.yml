name: ci-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/calculator-backend/**'
      - 'helm/calculator-backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'apps/calculator-backend/**'
      - 'helm/calculator-backend/**'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  APP: calculator-backend
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/calculator-backend
  PY: '3.12'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/calculator-backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PY }}' }
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff + pylint)
        run: |
          ruff check app tests
          pylint app --fail-under=8.0 || true
      - name: Unit tests + coverage
        run: pytest
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with: { name: coverage-backend, path: apps/calculator-backend/coverage.xml }

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Semgrep scan
        run: |
          pip install semgrep==1.94.0
          semgrep scan --severity ERROR --error --config p/ci --config p/python --config p/security-audit apps/calculator-backend

  build-scan-push:
    needs: [lint-test, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/calculator-backend
          push: false
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-backend.sarif }
      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
      - name: Bump image tag in argocd-apps/dev
        uses: ./.github/actions/gitops-bump
        with:
          app: calculator-backend
          env: dev
          tag: ${{ steps.tag.outputs.tag }}
