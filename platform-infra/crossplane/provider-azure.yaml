apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-upjet-azure
spec:
  package: xpkg.upbound.io/upbound/provider-azure:v1.5.0
---
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: azure-creds
      key: credentials
